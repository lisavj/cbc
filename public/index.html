<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alert Feed</title>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #12161f;
    --panel-border: #1f2530;
    --text: #e5e9f0;
    --muted: #6b7280;
    --accent: #f5a623;
    --bull: #22c55e;
    --bear: #ef4444;
    --mono: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--bg);
    border-bottom: 1px solid var(--panel-border);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .brand b { color: var(--text); }
  .pulse {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .pulse.live {
    background: var(--bull);
    box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6);
    animation: ping 1.8s ease-out infinite;
  }
  @keyframes ping {
    0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.55); }
    70% { box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
    100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
  }
  .stats {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    display: flex;
    gap: 18px;
  }
  .stats strong { color: var(--accent); font-weight: 600; }
  .actions button {
    background: transparent;
    border: 1px solid var(--panel-border);
    color: var(--muted);
    font-family: var(--sans);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
  }
  .actions button:hover { color: var(--text); border-color: var(--muted); }

  main {
    max-width: 880px;
    margin: 0 auto;
    padding: 20px;
  }
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 14px;
  }
  .empty .big { font-size: 28px; margin-bottom: 10px; color: var(--panel-border); }

  .card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 14px;
    animation: slidein 0.25s ease-out;
  }
  @keyframes slidein {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 10px 14px;
    background: #060810;
    cursor: pointer;
    user-select: none;
    gap: 10px;
  }
  .card-top:hover { background: #0c0f18; }
  .card-top-left {
    display: flex;
    align-items: baseline;
    gap: 10px;
    min-width: 0;
  }
  .chevron {
    display: inline-block;
    color: var(--muted);
    font-size: 11px;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }
  .card.expanded .chevron { transform: rotate(90deg); color: var(--accent); }
  .card-summary {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-time {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }
  .card-ago {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--panel-border);
  }
  .card-headline,
  .field-body {
    display: none;
  }
  .card.expanded .card-headline {
    display: block;
  }
  .card.expanded .field-body {
    display: block;
  }
  .card-headline {
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.5;
    padding: 10px 14px;
    background: #1a1300;
    color: var(--accent);
    border-bottom: 1px solid var(--panel-border);
    white-space: pre-wrap;
    word-break: break-word;
    cursor: help;
  }
  .card-headline:hover { background: #241900; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    max-width: 480px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 18px 20px;
    font-family: var(--sans);
  }
  .modal-box h3 {
    margin: 0 0 4px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
  }
  .modal-box p {
    margin: 6px 0 16px;
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--text);
  }
  .modal-box .none {
    color: var(--muted);
    font-size: 13px;
  }
  .modal-close {
    display: block;
    margin: 8px auto 0;
    background: transparent;
    border: 1px solid var(--panel-border);
    color: var(--muted);
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 12.5px;
  }
  .modal-close:hover { color: var(--text); border-color: var(--muted); }
  .row-group {
    display: flex;
    flex-wrap: wrap;
    border-top: 2px solid #ffffff;
  }
  .row-group:last-child { border-bottom: 2px solid #ffffff; }
  .field {
    flex: 1 1 0;
    min-width: 90px;
    border-right: 2px solid #ffffff;
    padding: 7px 12px;
    font-family: var(--mono);
    font-size: 12.5px;
  }
  .field:last-child { border-right: none; }
  .field .k {
    display: block;
    color: #cbd5e1;
    font-size: 10.5px;
    margin-bottom: 2px;
  }
  .field .v {
    display: block;
    font-weight: 600;
    word-break: break-word;
  }
  .field.bull { background: rgba(34,197,94,0.28); }
  .field.bull .v { color: #bbf7d0; }
  .field.bear { background: rgba(239,68,68,0.28); }
  .field.bear .v { color: #fecaca; }
  .field.neutral { background: #0e1219; }
  .field.ny { background: #ff9800; }
  .field.ny .v { color: #3d1e00; }
  .field.london { background: #9c27b0; }
  .field.london .v { color: #fff; }
  .field.asian { background: #e65100; }
  .field.asian .v { color: #fff; }

  /* Phones: smaller text, chips can drop to a bit narrower before wrapping. */
  @media (max-width: 560px) {
    main { padding: 12px; }
    .card-top { flex-direction: column; align-items: flex-start; gap: 4px; }
    .card-summary { max-width: 100%; }
    .field { min-width: 78px; font-size: 11.5px; padding: 6px 9px; }
    .field .k { font-size: 9.5px; }
  }

  footer {
    text-align: center;
    padding: 30px 20px 50px;
    color: var(--panel-border);
    font-family: var(--mono);
    font-size: 11px;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="pulse" id="pulse"></span>
    <span>Alert Feed <b id="conn">connecting…</b></span>
  </div>
  <div class="stats">
    <span><strong id="count">0</strong> received</span>
  </div>
  <div class="actions">
    <button id="clearBtn">Clear all</button>
  </div>
</header>

<main>
  <div id="list"></div>
  <div class="empty" id="emptyState" style="display:none;">
    <div class="big">···</div>
    Waiting for the first alert.<br />
    Point a TradingView alert's webhook URL here and it'll show up instantly.
  </div>
</main>

<footer>tv-webhook-dashboard</footer>

<div class="modal-overlay" id="defModal">
  <div class="modal-box" id="defModalBox"></div>
</div>

<script>
  const listEl = document.getElementById('list');
  const countEl = document.getElementById('count');
  const emptyEl = document.getElementById('emptyState');
  const connEl = document.getElementById('conn');
  const pulseEl = document.getElementById('pulse');
  const clearBtn = document.getElementById('clearBtn');

  let alerts = [];
  const expandedIds = new Set();

  // ---------------------------------------------------------------------
  // ROW GROUPING — edit this to control exactly which fields share a row.
  // Each inner array = one row, listing 1-3 (or more) field labels that should
  // sit side by side. Matching is by PREFIX (so "CBC (15m" also matches
  // "CBC (15m, live/unconfirmed)"). Order here also sets the display order.
  // Anything from an alert that ISN'T listed below just falls back to its
  // own full-width row, in the order it appeared — so new/unlisted fields
  // never get silently dropped, they just aren't grouped.
  // ---------------------------------------------------------------------
  const ROW_GROUPS = [
    ['Time', 'Market'],
    ['Chart', 'Price'],
    ['CBC (3m)'],
    ['CBC (15m)', 'CBC (15m, live'],
    ['CBC (1H)', 'CBC (1H, live'],
    ['Opening range', 'ORB set'],
    ['Structure (3m)', 'Structure (15m)', 'Structure (1H)'],
    ['EMA cloud (3m)', 'EMA cloud (15m)', 'EMA cloud (1H)'],
    ['VWAP', 'EMA 200'],
    ['EMA9/20 (3)', 'EMA9/20 (15)'],
    ['CBC (3m) last flip', 'CBC (15m) last flip', 'CBC (1H) last flip'],
    ['Buy Zone High', 'Buy Zone Low'],
  ];

  // Fields whose label starts with any of these are dropped entirely from the dashboard — not
  // grouped, not shown standalone, just skipped. Edit this list to hide/unhide fields.
  const HIDDEN_FIELDS = ['Prev Candle', 'HTF Candle'];

  // ---------------------------------------------------------------------
  // ALERT TYPE DEFINITIONS — same text as the (i) tooltips next to each alert
  // checkbox in the Pine script's Alerts settings group. Checked in order,
  // first match per headline bullet line wins. Update this if the script's
  // own tooltips change, to keep them in sync.
  // ---------------------------------------------------------------------
  const ALERT_TYPE_DEFS = [
    {
      test: (l) => /A\+ Setup/i.test(l),
      title: 'A+ Setup (Long/Short)',
      def: 'Fires once when: (1) confirmed HTF CBC direction, (2) chart-timeframe EMA cloud, and (3) HTF EMA cloud all align in the same direction, (4) price is already CONFIRMED on the trade\'s side of VWAP (above VWAP for Long, below VWAP for Short), AND (5) price is still ANTICIPATORY on the Opening Range — hasn\'t broken the ORB high (Long) / ORB low (Short) yet, i.e. before that breakout confirms.'
    },
    {
      test: (l) => /ORB Retest/i.test(l),
      title: 'ORB Retest / Break & Base (Long/Short)',
      def: 'Fires once on the classic ORB playbook: (1) price already closed outside the session\'s Opening Range (the initial breakout), (2) price pulled back and retested the broken level from the other side, and (3) a bar then closed back in the breakout direction, confirming the level flipped from resistance to support (Long) or support to resistance (Short). Only fires within the configured "Max bars to wait for retest" of the original breakout.'
    },
    {
      test: (l) => /Outside HTF ORB/i.test(l),
      title: 'Outside HTF ORB (Bullish/Bearish)',
      def: 'Fires once when price closes outside the current session\'s Opening Range — above the ORB high (Bullish) or below the ORB low (Bearish). Uses whichever session\'s OR is currently active (Asian/London/New York).'
    },
    {
      test: (l) => /VWAP Break/i.test(l),
      title: 'VWAP Break (Bullish/Bearish)',
      def: 'Fires once when price closes on the opposite side of VWAP from where it was the prior bar (a VWAP cross), either direction.'
    },
    {
      test: (l) => /EMA 200 Break/i.test(l),
      title: 'EMA 200 Break (Bullish/Bearish)',
      def: 'Fires once when price closes on the opposite side of EMA 200 from where it was the prior bar (an EMA200 cross), either direction.'
    },
    {
      test: (l) => /Agreement/i.test(l) && /early\/unconfirmed/i.test(l),
      title: 'LTF + HTF Agreement - Early (unconfirmed HTF)',
      def: 'Fires once, as soon as the chart timeframe agrees with the HTF\'s LIVE, still-forming state — before that HTF bar closes, tagged UNCONFIRMED. If the live HTF state reverses before its bar closes, no confirmed alert follows — you only got the early heads-up. If it holds, a confirmed "LTF + HTF Agreement" alert fires automatically once that HTF bar closes.'
    },
    {
      test: (l) => /Agreement/i.test(l),
      title: 'LTF + HTF Agreement (Long/Short)',
      def: 'Fires the moment the chart timeframe and the CONFIRMED (last closed) HTF bar both agree — both Long or both Short — i.e. entering agreement, not repeated every bar while still in agreement.'
    },
    {
      test: (l) => /HTF\(/i.test(l) && /CBC Flip/i.test(l) && /(UNCONFIRMED|still forming)/i.test(l),
      title: 'HTF CBC Flip - Early (unconfirmed, still forming)',
      def: 'Fires once, as soon as the HTF\'s LIVE, still-forming state would flip — before that HTF bar closes, tagged UNCONFIRMED. If the live HTF state reverses before its bar closes, no confirmed alert follows. If it holds, a confirmed "HTF CBC Flip" alert fires automatically once that HTF bar closes.'
    },
    {
      test: (l) => /HTF\(/i.test(l) && /CBC Flip/i.test(l),
      title: 'HTF CBC Flip (Long/Short)',
      def: 'Fires once the HTF bar has fully CLOSED and its CBC flipped (last closed HTF bar only). Confirmed — won\'t fire on a signal that reverses before that HTF bar closes.'
    },
    {
      test: (l) => /LTF\(/i.test(l) && /CBC Flip/i.test(l) && /(UNCONFIRMED|mid-candle)/i.test(l),
      title: 'LTF CBC Flip - Early (unconfirmed, mid-candle)',
      def: 'Fires once, as soon as the LIVE still-forming candle would trigger a flip — before the bar closes, tagged UNCONFIRMED. If price reverses before close, no confirmed alert follows. If it holds, a confirmed "LTF CBC Flip" alert fires automatically at that bar\'s actual close.'
    },
    {
      test: (l) => /LTF\(/i.test(l) && /CBC Flip/i.test(l),
      title: 'LTF CBC Flip (Long/Short)',
      def: 'Fires once the bar has fully CLOSED and the chart-timeframe CBC flipped. Confirmed — won\'t fire on a signal that reverses before close.'
    },
  ];

  function getDefinitionsForHeadline(headlineLines) {
    const bulletLines = headlineLines.filter(l => l.startsWith('•'));
    const seen = new Set();
    const results = [];
    bulletLines.forEach(line => {
      const match = ALERT_TYPE_DEFS.find(d => d.test(line));
      if (match && !seen.has(match.title)) {
        seen.add(match.title);
        results.push(match);
      }
    });
    return results;
  }

  function timeAgo(iso) {
    const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (s < 60) return s + 's ago';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    return Math.floor(s / 86400) + 'd ago';
  }

  function classify(text) {
    const t = text.toUpperCase();
    if (t.includes('LONG') || t.includes('BULLISH')) return 'bull';
    if (t.includes('SHORT') || t.includes('BEARISH')) return 'bear';
    return '';
  }

  // Per-row coloring, mirroring the on-chart Status table's logic: bullish/LONG green, bearish/SHORT
  // red, session-colored for the Market row, plain otherwise (Time, Chart, ORB set, EMA comparison
  // lines, etc. don't get a bull/bear read so they stay neutral).
  function classifyRow(key, value) {
    const k = key.toUpperCase();
    const v = value.toUpperCase();
    if (k === 'MARKET') {
      if (v.includes('NEW YORK')) return 'ny';
      if (v.includes('LONDON')) return 'london';
      if (v.includes('ASIAN')) return 'asian';
      return 'neutral';
    }
    if (k.startsWith('STRUCTURE')) {
      // Matches the Pine script's v3.22 rule: green only for a full bullish structure (Higher
      // High AND Higher Low), red only for a full bearish structure (Lower High AND Lower Low).
      // Mixed readings (HH/LL, LH/HL) stay neutral.
      if (v.replace(/\s/g, '') === 'HH/HL') return 'bull';
      if (v.replace(/\s/g, '') === 'LH/LL') return 'bear';
      return 'neutral';
    }
    if (v.includes('BULLISH') || v.startsWith('LONG') || v.includes(' LONG ')) return 'bull';
    if (v.includes('BEARISH') || v.startsWith('SHORT') || v.includes(' SHORT ')) return 'bear';
    if (v.startsWith('ABOVE')) return 'bull';
    if (v.startsWith('BELOW')) return 'bear';
    return 'neutral';
  }

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // "CBC (3m) last flip" etc. normally read like "LONG 7/22 18:51 ET  #1" — too long to fit 3 per
  // row. Drops the date (keeps time) since these are grouped side by side: "LONG 18:51 #1".
  function shortenLastFlip(key, value) {
    if (!key.includes('last flip')) return value;
    const m = value.match(/^(LONG|SHORT)\s+\d{1,2}\/\d{1,2}\s+(\d{1,2}:\d{2})\s+ET\s+(#\d+)/i);
    return m ? `${m[1]} ${m[2]} ${m[3]}` : value;
  }

  // Arranges [key, value] pairs into rows per ROW_GROUPS: each configured group becomes one row
  // (in the order fields are found — a group with a missing field just renders fewer chips that
  // row), and anything left over becomes its own single-field row, in original order.
  function groupRows(rows) {
    const used = new Array(rows.length).fill(false);
    const groupedRows = [];
    ROW_GROUPS.forEach(matchers => {
      const found = [];
      matchers.forEach(prefix => {
        const idx = rows.findIndex((r, i) => !used[i] && r[0].startsWith(prefix));
        if (idx !== -1) {
          used[idx] = true;
          found.push(rows[idx]);
        }
      });
      if (found.length) groupedRows.push(found);
    });
    rows.forEach((r, i) => {
      if (!used[i]) groupedRows.push([r]);
    });
    return groupedRows;
  }

  function render() {
    countEl.textContent = alerts.length;
    emptyEl.style.display = alerts.length ? 'none' : 'block';
    listEl.innerHTML = alerts.map(a => {
      const body = a.raw || '';
      const lines = body.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const headlineLines = [];
      const rows = [];
      lines.forEach((line, i) => {
        if (i === 0 || line.startsWith('•')) {
          headlineLines.push(line);
          return;
        }
        const idx = line.indexOf(': ');
        if (idx === -1) return; // skip lines that aren't "Key: Value" (shouldn't be many)
        const key = line.slice(0, idx);
        if (HIDDEN_FIELDS.some(prefix => key.startsWith(prefix))) return;
        rows.push([key, line.slice(idx + 2)]);
      });

      const bodyHtml = groupRows(rows).map(group => {
        const fieldsHtml = group.map(([k, v]) => {
          const displayV = shortenLastFlip(k, v);
          const cls = classifyRow(k, v);
          return `<div class="field ${cls}"><span class="k">${escapeHtml(k)}</span><span class="v">${escapeHtml(displayV)}</span></div>`;
        }).join('');
        return `<div class="row-group">${fieldsHtml}</div>`;
      }).join('');

      // One-line summary shown in the collapsed header: the ticker plus the first bullet (the main
      // headline), so you can tell alerts apart before expanding any of them.
      const tickerOnly = (lines[0] || '').replace(/[—\s]+$/, '');
      const summaryText = [tickerOnly, (headlineLines[1] || '').replace(/^•\s*/, '')].filter(Boolean).join(' — ');
      const isExpanded = expandedIds.has(a.id);

      return `<div class="card ${isExpanded ? 'expanded' : ''}" data-id="${a.id}">
        <div class="card-top" data-toggle="${a.id}">
          <div class="card-top-left">
            <span class="chevron">&#9656;</span>
            <span class="card-summary">${escapeHtml(summaryText)}</span>
          </div>
          <div style="display:flex; align-items:baseline; gap:10px; flex-shrink:0;">
            <span class="card-time">${new Date(a.receivedAt).toLocaleString()}</span>
            <span class="card-ago" data-ts="${a.receivedAt}">${timeAgo(a.receivedAt)}</span>
          </div>
        </div>
        ${headlineLines.length ? `<div class="card-headline" data-headline="${encodeURIComponent(headlineLines.join('\n'))}">${escapeHtml(headlineLines.join('\n'))}</div>` : ''}
        <div class="field-body">${bodyHtml}</div>
      </div>`;
    }).join('');
  }

  function tickAgo() {
    document.querySelectorAll('.card-ago').forEach(el => {
      el.textContent = timeAgo(el.dataset.ts);
    });
  }
  setInterval(tickAgo, 15000);

  // Event delegation: card headers are recreated on every render() call (new alert arriving etc.),
  // so listen on the shared container instead of attaching a listener per card.
  listEl.addEventListener('click', (e) => {
    const headline = e.target.closest('.card-headline');
    if (headline) {
      const lines = decodeURIComponent(headline.dataset.headline).split('\n');
      showDefinitions(lines);
      return;
    }
    const header = e.target.closest('[data-toggle]');
    if (!header) return;
    const id = header.dataset.toggle;
    const card = header.closest('.card');
    if (expandedIds.has(id)) {
      expandedIds.delete(id);
      card.classList.remove('expanded');
    } else {
      expandedIds.add(id);
      card.classList.add('expanded');
    }
  });

  const defModal = document.getElementById('defModal');
  const defModalBox = document.getElementById('defModalBox');

  function showDefinitions(headlineLines) {
    const defs = getDefinitionsForHeadline(headlineLines);
    const content = defs.length
      ? defs.map(d => `<h3>${escapeHtml(d.title)}</h3><p>${escapeHtml(d.def)}</p>`).join('')
      : '<p class="none">No matching alert-type definition found for this headline.</p>';
    defModalBox.innerHTML = content + '<button class="modal-close" id="defModalCloseBtn">Close</button>';
    defModal.classList.add('open');
    document.getElementById('defModalCloseBtn').addEventListener('click', () => defModal.classList.remove('open'));
  }

  defModal.addEventListener('click', (e) => {
    if (e.target === defModal) defModal.classList.remove('open');
  });

  function flashPulse() {
    pulseEl.classList.add('live');
    setTimeout(() => pulseEl.classList.remove('live'), 1500);
  }

  // Initial load
  fetch('/alerts').then(r => r.json()).then(data => {
    alerts = data;
    render();
  });

  // Live stream
  const es = new EventSource('/stream');
  es.onopen = () => { connEl.textContent = 'live'; };
  es.onerror = () => { connEl.textContent = 'reconnecting…'; };
  es.onmessage = (e) => {
    const alert = JSON.parse(e.data);
    alerts.unshift(alert);
    render();
    flashPulse();
  };

  clearBtn.addEventListener('click', () => {
    if (!confirm('Clear all stored alerts?')) return;
    const token = prompt('Enter your webhook token to confirm (leave blank if you did not set one):') || '';
    fetch('/clear?token=' + encodeURIComponent(token), { method: 'POST' }).then(r => {
      if (r.ok) { alerts = []; render(); }
      else alert('Could not clear (check token).');
    });
  });
</script>

</body>
</html>
